version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/apps/api"
    schedule:
      interval: "weekly"
    groups:
      python-deps:
        patterns: ["*"]

  - package-ecosystem: "npm"
    directory: "/apps/web"
    schedule:
      interval: "weekly"
    groups:
      js-deps:
        patterns: ["*"]

  - package-ecosystem: "docker"
    directories:
      - "/apps/api"
      - "/apps/web"
    schedule:
      interval: "weekly"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
